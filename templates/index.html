<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake.io Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── LOBBY ── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }
    #lobby h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #4ECDC4, #45B7D1, #FF6B6B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }
    #lobby p { color: #888; font-size: 0.95rem; }
    #nameInput {
      padding: 12px 20px;
      font-size: 1.1rem;
      border: 2px solid #4ECDC4;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      outline: none;
      width: 260px;
      text-align: center;
    }
    #nameInput:focus { border-color: #45B7D1; }
    #playBtn {
      padding: 12px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4ECDC4, #45B7D1);
      color: #0d0d1a;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    #playBtn:hover { transform: scale(1.05); }
    #playBtn:active { transform: scale(0.97); }
    .controls-hint {
      color: #555;
      font-size: 0.82rem;
      text-align: center;
      line-height: 1.6;
    }

    /* ── GAME WRAPPER ── */
    #gameWrapper {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #222;
      image-rendering: pixelated;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 20;
    }
    .hud-item { display: flex; align-items: center; gap: 6px; }
    .hud-item span:first-child { color: #888; }
    .hud-val { font-weight: 700; font-size: 1rem; }

    /* ── LEADERBOARD ── */
    #leaderboard {
      position: fixed;
      top: 60px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 160px;
      z-index: 20;
      pointer-events: none;
    }
    #leaderboard h3 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .lb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: #aaa; font-size: 0.78rem; }
    .lb-me { font-weight: 700; }

    /* ── DEATH SCREEN ── */
    #deathScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 30;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #deathScreen h2 {
      font-size: 2.5rem;
      color: #FF6B6B;
    }
    .death-stats {
      display: flex;
      gap: 28px;
      background: rgba(255,255,255,0.05);
      padding: 14px 30px;
      border-radius: 12px;
    }
    .death-stat { text-align: center; }
    .death-stat .val { font-size: 2rem; font-weight: 800; color: #4ECDC4; }
    .death-stat .lbl { font-size: 0.78rem; color: #666; margin-top: 2px; }
    #respawnBtn {
      padding: 12px 40px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #FF6B6B, #FF9F43);
      color: #fff;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #respawnBtn:hover { transform: scale(1.05); }

    /* ── PING ── */
    #ping {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 0.72rem;
      color: #444;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>SNAKE.IO</h1>
  <p>Multiplayer — eat, grow, destroy</p>
  <input id="nameInput" type="text" maxlength="16" placeholder="Your name…" />
  <button id="playBtn">PLAY</button>
  <div class="controls-hint">
    Arrow keys / WASD to move<br>
    Crash into others to kill them
  </div>
</div>

<!-- GAME -->
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-item"><span>Score</span><span id="hudScore" class="hud-val">0</span></div>
    <div class="hud-item"><span>Kills</span><span id="hudKills" class="hud-val">0</span></div>
    <div class="hud-item"><span>Length</span><span id="hudLen" class="hud-val">3</span></div>
    <div class="hud-item"><span>Players</span><span id="hudPlayers" class="hud-val">1</span></div>
  </div>

  <div id="leaderboard">
    <h3>Leaderboard</h3>
    <div id="lbRows"></div>
  </div>

  <div id="deathScreen">
    <h2>YOU DIED</h2>
    <div class="death-stats">
      <div class="death-stat"><div id="dScore" class="val">0</div><div class="lbl">Score</div></div>
      <div class="death-stat"><div id="dKills" class="val">0</div><div class="lbl">Kills</div></div>
      <div class="death-stat"><div id="dLen" class="val">0</div><div class="lbl">Length</div></div>
    </div>
    <button id="respawnBtn">RESPAWN</button>
  </div>

  <div id="ping">●</div>
  <div id="startHint" style="display:none;position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.75);padding:10px 24px;border-radius:20px;font-size:0.9rem;
    color:#4ECDC4;pointer-events:none;z-index:20;letter-spacing:1px;">
    Press any arrow key or WASD to start moving
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function () {
  const lobby       = document.getElementById('lobby');
  const gameWrapper = document.getElementById('gameWrapper');
  const canvas      = document.getElementById('gameCanvas');
  const ctx         = canvas.getContext('2d');
  const nameInput   = document.getElementById('nameInput');
  const playBtn     = document.getElementById('playBtn');
  const deathScreen = document.getElementById('deathScreen');
  const respawnBtn  = document.getElementById('respawnBtn');
  const hudScore    = document.getElementById('hudScore');
  const hudKills    = document.getElementById('hudKills');
  const hudLen      = document.getElementById('hudLen');
  const hudPlayers  = document.getElementById('hudPlayers');
  const lbRows      = document.getElementById('lbRows');
  const pingEl      = document.getElementById('ping');
  const startHint   = document.getElementById('startHint');

  const CELL = 16;  // px per grid cell
  let GRID_W = 50, GRID_H = 40;

  let myId    = null;
  let myColor = '#4ECDC4';
  let gameState = null;
  let dead    = false;

  // ── Socket ──────────────────────────────────────────────────
  const socket = io({ transports: ['websocket'] });

  socket.on('config', (cfg) => {
    GRID_W = cfg.grid_w;
    GRID_H = cfg.grid_h;
    canvas.width  = GRID_W * CELL;
    canvas.height = GRID_H * CELL;
  });

  socket.on('joined', (data) => {
    myId    = data.id;
    myColor = data.color;
    dead    = false;
    startHint.style.display = 'block';
  });

  socket.on('game_state', (state) => {
    gameState = state;
    if (state.grid) {
      GRID_W = state.grid.w;
      GRID_H = state.grid.h;
      canvas.width  = GRID_W * CELL;
      canvas.height = GRID_H * CELL;
    }
    renderFrame();
  });

  socket.on('you_died', (data) => {
    if (dead) return;
    dead = true;
    document.getElementById('dScore').textContent = data.score;
    document.getElementById('dKills').textContent = data.kills;
    document.getElementById('dLen').textContent   = data.length;
    deathScreen.style.display = 'flex';
  });

  // Ping
  let pingStart = 0;
  setInterval(() => { pingStart = Date.now(); socket.emit('ping_check'); }, 3000);
  socket.on('pong_check', () => {
    pingEl.textContent = `${Date.now() - pingStart}ms`;
  });

  // ── Controls ────────────────────────────────────────────────
  const KEY_DIR = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', s: 'down', a: 'left', d: 'right',
    W: 'up', S: 'down', A: 'left', D: 'right',
  };

  let lastDir = null;
  function sendDir(d) {
    lastDir = d;
    startHint.style.display = 'none';
    socket.emit('dir', { d });
  }
  document.addEventListener('keydown', (e) => {
    const d = KEY_DIR[e.key];
    if (d && d !== lastDir) {
      sendDir(d);
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    }
  });

  // Touch / swipe
  let touchStart = null;
  document.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let d;
    if (Math.abs(dx) > Math.abs(dy)) {
      d = dx > 0 ? 'right' : 'left';
    } else {
      d = dy > 0 ? 'down' : 'up';
    }
    sendDir(d);
  }, { passive: true });

  // ── Lobby ────────────────────────────────────────────────────
  function startGame() {
    const name = nameInput.value.trim() || 'Snake';
    lobby.style.display = 'none';
    gameWrapper.style.display = 'block';
    socket.emit('join', { name });
  }

  playBtn.addEventListener('click', startGame);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });

  respawnBtn.addEventListener('click', () => {
    deathScreen.style.display = 'none';
    dead = false;
    lastDir = null;
    startHint.style.display = 'block';
    socket.emit('respawn');
  });

  // ── Camera (follow my snake) ─────────────────────────────────
  let camX = 0, camY = 0;
  const VIEW_W = () => Math.min(canvas.width,  window.innerWidth);
  const VIEW_H = () => Math.min(canvas.height, window.innerHeight);

  function updateCamera(headX, headY) {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / (GRID_W * CELL), vh / (GRID_H * CELL));
    // We'll draw everything and just let CSS scale the canvas
  }

  // Scale canvas to fit screen
  function resizeCanvas() {
    const scale = Math.min(
      window.innerWidth  / (GRID_W * CELL),
      window.innerHeight / (GRID_H * CELL)
    );
    canvas.style.width  = (GRID_W * CELL * scale) + 'px';
    canvas.style.height = (GRID_H * CELL * scale) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ── Render ───────────────────────────────────────────────────
  function renderFrame() {
    if (!gameState) return;
    resizeCanvas();

    const { players, food } = gameState;

    // Background grid
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid lines
    ctx.strokeStyle = '#161626';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= GRID_W; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, GRID_H * CELL);
      ctx.stroke();
    }
    for (let y = 0; y <= GRID_H; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(GRID_W * CELL, y * CELL);
      ctx.stroke();
    }

    // Food
    for (const f of food) {
      const cx = f.x * CELL + CELL / 2;
      const cy = f.y * CELL + CELL / 2;
      const r  = CELL * 0.35;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Snakes
    let mySnake = null;
    const sorted = [...players].sort((a, b) => b.length - a.length);

    for (const p of sorted) {
      if (p.id === myId) mySnake = p;
      if (!p.alive) continue;
      drawSnake(p, p.id === myId);
    }

    // HUD
    if (mySnake) {
      hudScore.textContent   = mySnake.score;
      hudKills.textContent   = mySnake.kills;
      hudLen.textContent     = mySnake.length;
    }
    hudPlayers.textContent = players.filter(p => p.alive).length;

    // Leaderboard (top 8 alive)
    const top = [...players]
      .filter(p => p.alive)
      .sort((a, b) => b.length - a.length)
      .slice(0, 8);
    lbRows.innerHTML = top.map((p, i) => `
      <div class="lb-row ${p.id === myId ? 'lb-me' : ''}">
        <div class="lb-dot" style="background:${p.color}"></div>
        <div class="lb-name">${escHtml(p.name)}</div>
        <div class="lb-score">${p.length}</div>
      </div>
    `).join('');
  }

  function drawSnake(p, isMe) {
    const body = p.body;
    if (!body || body.length === 0) return;

    const color = p.color;

    // Glow effect for current player
    if (isMe) {
      ctx.shadowColor = color;
      ctx.shadowBlur  = 12;
    }

    // Body segments (rounded rects)
    for (let i = body.length - 1; i >= 1; i--) {
      const seg = body[i];
      const t   = 1 - i / body.length; // 0 at tail, 1 at head
      const alpha = 0.55 + 0.45 * t;
      ctx.fillStyle = hexAlpha(color, alpha);
      roundRect(ctx, seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 3);
      ctx.fill();
    }

    // Head
    const head = body[0];
    ctx.fillStyle = color;
    roundRect(ctx, head.x * CELL + 1, head.y * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fill();

    // Eyes
    drawEyes(head, p.direction || 'right', color);

    ctx.shadowBlur = 0;

    // Name tag above head
    ctx.font = `bold ${CELL * 0.75}px Segoe UI, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    const tw = ctx.measureText(p.name).width;
    ctx.fillRect(
      head.x * CELL + CELL / 2 - tw / 2 - 2,
      head.y * CELL - CELL * 1.1,
      tw + 4, CELL * 0.85
    );
    ctx.fillStyle = isMe ? '#fff' : '#ccc';
    ctx.fillText(p.name, head.x * CELL + CELL / 2, head.y * CELL - CELL * 0.35);
    ctx.textAlign = 'left';
  }

  function drawEyes(head, dir, color) {
    const cx = head.x * CELL + CELL / 2;
    const cy = head.y * CELL + CELL / 2;
    const offsets = {
      right: [[ 2,  -2], [ 2,  2]],
      left:  [[-2,  -2], [-2,  2]],
      up:    [[-2,  -2], [ 2, -2]],
      down:  [[-2,   2], [ 2,  2]],
    };
    const eyes = offsets[dir] || offsets.right;
    for (const [ex, ey] of eyes) {
      ctx.beginPath();
      ctx.arc(cx + ex, cy + ey, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + ex * 1.1, cy + ey * 1.1, 0.9, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function hexAlpha(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

})();
</script>
</body>
</html>
